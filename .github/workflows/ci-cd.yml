name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: credit-scoring-api
  REGISTRY: ghcr.io
  IMAGE_FULL: ghcr.io/${{ github.repository_owner }}/credit-scoring-api

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Tests (unitaires + intégration)
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-docker.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build image Docker (seulement si tests OK)
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FULL }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: app
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Déploiement simulé (seulement sur main)
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy — simulation locale avec docker-compose
        run: |
          echo "🚀 Déploiement de l'image : ${{ env.IMAGE_FULL }}:latest"
          docker pull ${{ env.IMAGE_FULL }}:latest
          docker run -d \
            --name credit-scoring-api-deploy \
            -p 8000:8000 \
            -e OPTIMAL_THRESHOLD=0.48 \
            ${{ env.IMAGE_FULL }}:latest

      - name: Smoke test — vérification /health
        run: |
          sleep 10
          curl --fail http://localhost:8000/health \
            && echo "✅ API opérationnelle" \
            || (echo "❌ API non disponible" && exit 1)

      - name: Deployment summary
        run: |
          echo "## 🚀 Déploiement réussi" >> $GITHUB_STEP_SUMMARY
          echo "- Image : \`${{ env.IMAGE_FULL }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch : \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
