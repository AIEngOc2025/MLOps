name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        run: |
          docker build --target app -t ${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.IMAGE_NAME }}:latest

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---

  deploy:
    name: 🚀 Déploiement Hugging Face
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Git LFS, README et Pousser
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USERNAME }}
        run: |
          # 1. Installation et configuration LFS
          git lfs install
          # ... (après l'installation de git lfs)

          # 1. On s'assure que le fichier .db est bien suivi par LFS
          git lfs track "utilitaires/credit_score.db"
          git lfs track "*.db"
          
          # 2. IMPORTANT : On force Git à considérer le .gitattributes en premier
          git add .gitattributes
          
          # 3. On "rafraîchit" le fichier dans l'index Git
          # Cela force Git à transformer le vrai fichier en pointeur LFS
          git add --renormalize utilitaires/credit_score.db
          
          # 4. On ajoute le reste et on commit
          git add .
          git commit -m "deploy: force LFS for sqlite database" || echo "No changes"
          
          # 5. Push
          git push --force https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score main
          
          # 2. Identité Git
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          # 3. NETTOYAGE CRITIQUE : on retire les fichiers MLflow de l'index Git
          # Cela évite que Git ne cherche des objets LFS inexistants ou corrompus
          git rm -r --cached ML/mlruns/ 2>/dev/null || true
          git rm -r --cached mlruns/ 2>/dev/null || true

          # 4. Création du README pour HF
          cat <<EOF > README.md
          ---
          title: Credit Score API
          emoji: 💰
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          # Credit Scoring API
          Déploiement automatique via GitHub Actions.
          EOF

          # 5. Déclaration LFS ciblée (on évite de tracker tout le projet)
          git lfs track "models/*.joblib"
          git lfs track "models/*.pkl"
          git lfs track "*.db"
          
          # 6. Ajout sélectif des fichiers nécessaires
          git add .gitattributes README.md Dockerfile requirements.txt src/
          git add models/*.joblib models/*.pkl 2>/dev/null || true
          
          # 7. Préparation de la branche et Push
          git checkout -b main || git checkout main
          git commit -m "deploy: stable build without mlflow logs ${{ github.sha }}" || echo "No changes"
          
          git push --force https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score main