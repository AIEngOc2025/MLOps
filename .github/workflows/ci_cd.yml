name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        run: |
          docker build --target app -t ${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.IMAGE_NAME }}:latest

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---
  deploy:
    name: 🚀 Déploiement Hugging Face
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Git LFS, README et Pousser
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USERNAME }}
        run: |
          # 1. Installation de Git LFS
          git lfs install
          
          # 2. Configuration de l'identité Git
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git config lfs.allowincompletepush true

          # 3. Création forcée du README.md avec les métadonnées YAML pour HF
          # Cela évite le "Configuration Error" en forçant le mode Docker
          cat <<EOF > README.md
          ---
          title: Credit Score API
          emoji: 💰
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          # Credit Scoring API
          Déploiement automatique via GitHub Actions.
          EOF

          # 4. Déclaration LFS et ajout des fichiers
          git lfs track "*.joblib"
          git lfs track "*.pkl"
          git lfs track "*.db"
          
          git add .gitattributes README.md
          git add models/*.joblib models/*.pkl 2>/dev/null || true
          
          # 5. Commit et Push
          # On s'assure d'être sur la branche main localement pour le push
          git checkout -b main || git checkout main
          git commit -m "deploy: update model, metadata and app ${{ github.sha }}" || echo "No changes to commit"
          
          # Push vers le repository Space de Hugging Face
          git push --force https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score main