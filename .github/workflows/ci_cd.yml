name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    # On ne pousse sur Docker Hub que depuis main ou dev (pas les PRs)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push (SHA + latest)
        run: |
          docker build --target app \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---
  deploy:
    name: 🚀 Déploiement Hugging Face
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # Crucial : récupère les vrais fichiers LFS pour les renvoyer à HF

      - name: Configurer Git, LFS, README et Pousser vers Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USERNAME }}
        run: |
          # 1. Identité Git (Global pour éviter les erreurs d'ident)
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # 2. Installation et configuration LFS
          git lfs install
          git config --global lfs.allowincompletepush true

          # 3. Branche locale : s'assurer qu'on s'appelle 'main'
          git checkout -b main || git checkout main

          # 4. Nettoyage de l'index
          git rm -r --cached ML/mlruns/ 2>/dev/null || true
          git rm -r --cached mlruns/ 2>/dev/null || true

          # 5. Création du README pour Hugging Face
          cat <<EOF > README.md
          ---
          title: Credit Score API
          emoji: 💰
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          # Credit Scoring API
          Déploiement automatique via GitHub Actions.
          Mise à jour : $(date)
          EOF

          # 6. Gestion LFS et Ajout des fichiers
          git lfs track "*.db"
          git lfs track "models/*.joblib"
          git lfs track "models/*.pkl"
          
          git add .gitattributes README.md Dockerfile requirements.txt src/
          git add --renormalize utilitaires/credit_score.db 2>/dev/null || true
          git add models/*.joblib models/*.pkl 2>/dev/null || true
          
          # On ajoute le reste (le code src, etc.)
          git add .

          # 7. Commit unique
          git commit -m "deploy: build ${{ github.sha }}" || echo "No changes to commit"

          # 8. Push vers Hugging Face (Utilisation de l'URL avec authentification)
          git push --force https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score main