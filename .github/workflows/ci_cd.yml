# ═══════════════════════════════════════════════════════════════════════════════
# .github/workflows/ci.yml — Pipeline CI/CD Credit Scoring API
#
# Déclenchement : push ou pull_request sur les branches main et dev
#
# Jobs (séparés et séquentiels) :
#   1. test    → lance les tests via Docker (--target test)
#   2. build   → construit l'image de production et la pousse sur Docker Hub
#   3. deploy  → pousse le code vers Hugging Face Spaces (déploiement réel)
#
# Secrets GitHub requis (Settings → Secrets → Actions) :
#   DOCKER_USERNAME : ton identifiant Docker Hub
#   DOCKER_PASSWORD : token Docker Hub Read & Write
#   HF_USERNAME     : ton identifiant Hugging Face
#   HF_TOKEN        : token Hugging Face Read & Write
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]


# ─── Variables globales ────────────────────────────────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG:  ${{ github.sha }}


# ═══════════════════════════════════════════════════════════════════════════════
jobs:

# ─── Job 1 : TESTS ────────────────────────────────────────────────────────────
# Lance pytest à l'intérieur du stage Docker "test".
# Si un test échoue → le build Docker échoue → les jobs suivants sont bloqués.
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Lancer les tests via Docker (--target test)
        run: docker build --target test .


# ─── Job 2 : BUILD & PUSH ─────────────────────────────────────────────────────
# Construit l'image de production et la pousse sur Docker Hub.
# Ne s'exécute QUE si le job `test` a réussi.
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test                   # bloqué si `test` échoue

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construire l'image de production
        run: |
          docker build --target app \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Pousser l'image sur Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest


# ─── Job 3 : DÉPLOIEMENT → HUGGING FACE SPACES ────────────────────────────────
# Pousse le code source vers le repo Git du Space Hugging Face.
# HF reconstruit automatiquement l'image Docker à partir du Dockerfile.
# Ne s'exécute QUE si le job `build` a réussi ET uniquement sur main.
  # ... (début du fichier identique jusqu'au job deploy)

  deploy:
    name: 🚀 Déploiement Hugging Face
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Préparer le dossier de déploiement minimal
        run: |
          mkdir hf_deploy
          cp Dockerfile requirements.txt hf_deploy/
          cp -r src/ hf_deploy/src/
          
          # On crée le dossier models mais on ne copie QUE les fichiers non-binaires
          # ou on le laisse vide avec un .gitkeep
          mkdir -p hf_deploy/models
          touch hf_deploy/models/.gitkeep
          
          # Si tu as besoin de petits fichiers de configuration dans models, 
          # copie-les spécifiquement, mais SURTOUT PAS les .joblib ou .pkl
          # cp models/config.json hf_deploy/models/ 2>/dev/null || true

      - name: Configurer Git et pousser vers HF
        run: |
          cd hf_deploy
          git init
          # On crée un .gitignore local pour être doublement sûr
          echo "*.joblib" > .gitignore
          echo "*.pkl" >> .gitignore
          echo "*.db" >> .gitignore
          echo "mlruns/" >> .gitignore
          
          git config user.email "ci@github.com"
          git config user.name  "GitHub Actions"
          git add .
          git commit -m "deploy: ${{ github.sha }} (clean build)"
          
          # Push forcé vers le main de Hugging Face
          git push --force https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/Credit_Score main

      - name: Vérifier que l'API répond sur HF (/health)
        run: |
          # On attend 30s avant de commencer à tester (temps de build HF)
          sleep 30
          for i in $(seq 1 20); do
            # Note: l'URL Hugging Face transforme souvent les '_' en '-' dans le nom du Space
            URL="https://${{ secrets.HF_USERNAME }}-credit-score.hf.space/health"
            if curl -sf "$URL"; then
              echo "✅ API opérationnelle sur Hugging Face"
              exit 0
            fi
            echo "⏳ Attente reconstruction HF... ($i/20) sur $URL"
            sleep 10
          done
          echo "❌ API non disponible après 200s"
          exit 1