name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        run: |
          docker build --target app -t ${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.IMAGE_NAME }}:latest

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---
  deploy:
    name: 🚀 Déploiement Hugging Face
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'||github.ref == 'refs/heads/dev'
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour le push Git

      - name: Configurer Git LFS et Pousser vers HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USERNAME }}
        run: |
          # 1. Installation de Git LFS
          git lfs install
          
          # 2. Déclaration des fichiers lourds pour LFS
          git lfs track "*.joblib"
          git lfs track "*.pkl"
          git lfs track "*.db"
          
          # 3. Configuration de l'identité
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          
          # 4. Ajout du fichier .gitattributes (créé par lfs track) et push
          git add .gitattributes
          # On force l'ajout des fichiers au cas où ils seraient dans le .gitignore local
          git add models/*.joblib models/*.pkl 2>/dev/null || true
          
          git commit -m "deploy: update model and app ${{ github.sha }}" || echo "No changes to commit"
          
          # 5. Push vers HF (on utilise l'URL avec token)
          git push --force https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score main