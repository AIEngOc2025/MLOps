# ═══════════════════════════════════════════════════════════════════════════════
# .github/workflows/ci.yml — Pipeline CI/CD Credit Scoring API
#
# Déclenchement : push ou pull_request sur les branches main et dev
#
# Jobs (séparés et séquentiels) :
#   1. test    → lance les tests via Docker (--target test)
#   2. build   → construit l'image de production et la pousse sur Docker Hub
#   3. deploy  → simule un déploiement local (docker run)
#
# Secrets GitHub requis (Settings → Secrets → Actions) :
#   DOCKER_USERNAME : ton identifiant Docker Hub
#   DOCKER_PASSWORD : ton token Docker Hub (pas ton mot de passe)
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]


# ─── Variables globales ────────────────────────────────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG:  ${{ github.sha }}   # tag unique par commit


# ═══════════════════════════════════════════════════════════════════════════════
jobs:

# ─── Job 1 : TESTS ────────────────────────────────────────────────────────────
# Lance pytest à l'intérieur du stage Docker "test".
# Si un test échoue → le build Docker échoue → les jobs suivants sont bloqués.
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Lancer les tests via Docker (--target test)
        run: docker build --target test .


# ─── Job 2 : BUILD & PUSH ─────────────────────────────────────────────────────
# Construit l'image de production et la pousse sur Docker Hub.
# Ne s'exécute QUE si le job `test` a réussi.
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test                   # bloqué si `test` échoue

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construire l'image de production
        run: |
          docker build --target app \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Pousser l'image sur Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest


# ─── Job 3 : DÉPLOIEMENT SIMULÉ ───────────────────────────────────────────────
# Simule un déploiement en pré-prod :
#   - Stoppe le conteneur existant s'il tourne
#   - Lance un nouveau conteneur avec l'image fraîchement buildée
# Ne s'exécute QUE si le job `build` a réussi.
  deploy:
    name: 🚀 Déploiement (simulé)
    runs-on: ubuntu-latest
    needs: build                  # bloqué si `build` échoue

    steps:
      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Stopper le conteneur existant (si présent)
        run: docker stop credit-scoring-api || true
        # `|| true` évite que le job échoue si aucun conteneur ne tourne

      - name: Supprimer le conteneur existant (si présent)
        run: docker rm credit-scoring-api || true

      - name: Lancer le nouveau conteneur
        run: |
          docker run -d \
            --name credit-scoring-api \
            -p 8000:8000 \
            -e OPTIMAL_THRESHOLD=0.48 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Vérifier que l'API répond (/health)
        run: |
          # Attendre que l'API soit prête (max 30s)
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/health && echo "✅ API opérationnelle" && exit 0
            echo "⏳ Attente... ($i/10)"
            sleep 3
          done
          echo "❌ API non disponible après 30s" && exit 1