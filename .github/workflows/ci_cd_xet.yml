name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push (SHA + latest)
        run: |
          docker build --target app \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---
  deploy:
    name: 🚀 Déploiement Hugging Face (XET Mode)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: Installer git-xet
        run: |
          curl -fSSML https://huggingface.co/install-xet.sh | bash
          # On s'assure que le binaire est dans le PATH de l'étape suivante
          echo "$HOME/.xet" >> $GITHUB_PATH

      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # On ne télécharge PAS les objets LFS pour éviter les erreurs "missing"

      - name: Configurer et Pousser vers Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USERNAME }}
        run: |
          # 1. Identité et Initialisation XET
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git xet install --local
          
          # 2. Désactivation brutale de LFS (pour ignorer les résidus MLflow)
          git config --local lfs.enabled false
          git config --global lfs.enabled false

          # 3. Réinitialisation des attributs (Migration LFS -> XET)
          rm -f .gitattributes
          git xet init
          echo "*.db filter=xet -text" >> .gitattributes
          echo "models/*.joblib filter=xet -text" >> .gitattributes
          echo "models/*.pkl filter=xet -text" >> .gitattributes

          # 4. Nettoyage de l'index Git (on retire les fichiers fantômes)
          git rm -r --cached ML/mlruns/ mlruns/ 2>/dev/null || true
          git rm --cached utilitaires/mlflow.db 2>/dev/null || true
          git rm --cached utilitaires/credit_score.db 2>/dev/null || true

          # 5. Création du README pour Hugging Face (Indispensable)
          cat <<EOF > README.md
          ---
          title: Credit Score API
          emoji: 💰
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 7860
          xet: true
          ---
          # Credit Scoring API
          Déploiement via XET pour une gestion optimisée des données.
          EOF

          # 6. Ajout des fichiers et ré-indexation XET
          git add .gitattributes README.md Dockerfile requirements.txt src/
          git add utilitaires/credit_score.db
          git add models/ 2>/dev/null || true
          
          # Force Git à appliquer le filtre XET sur les fichiers binaires
          git add --renormalize .

          # 7. Commit et Push Forcé
          git checkout -b main || git checkout main
          git commit -m "deploy: hardware migration to xet ${{ github.sha }}" || echo "No changes"
          
          # On utilise HEAD:main pour être sûr de viser la branche de prod de HF
          git push --force https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score HEAD:main