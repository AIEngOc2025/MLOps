name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push (SHA + latest)
        run: |
          docker build --target app \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---
  deploy:
    name: 🚀 Sync vers Hugging Face (via Clone)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: Installer git-xet
        run: |
          curl -fSSML https://huggingface.co/install-xet.sh | bash
          echo "$HOME/.xet" >> $GITHUB_PATH

      - name: Récupérer le code source GitHub
        uses: actions/checkout@v4
        with:
          path: github_repo # On met le code GitHub dans un dossier spécifique
          fetch-depth: 0
          lfs: false

      - name: Cloner HF, Synchroniser et Pousser
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USERNAME }}
        run: |
          # 1. Configuration Git globale
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git xet install --local
          
          # 2. Clonage du Space HF dans un dossier 'hf_space'
          # On utilise le token directement dans l'URL
          git clone https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score hf_space
          
          # 3. Synchronisation des fichiers (GitHub -> HF)
          # On utilise rsync pour copier tout SAUF le dossier .git de GitHub
          # Cela permet de garder l'historique .git propre de Hugging Face
          rsync -av --delete --exclude='.git' github_repo/ hf_space/

          cd hf_space

          # 4. Initialisation XET dans le dossier HF
          git xet init
          
          # 5. Nettoyage des résidus LFS et MLflow dans le nouveau dossier
          sed -i '/filter=lfs/d' .gitattributes 2>/dev/null || true
          git rm -r --cached ML/mlruns/ mlruns/ 2>/dev/null || true
          git rm --cached utilitaires/mlflow.db 2>/dev/null || true

          # 6. Configuration des attributs XET
          echo "*.db filter=xet -text" > .gitattributes
          echo "models/*.joblib filter=xet -text" >> .gitattributes
          echo "models/*.pkl filter=xet -text" >> .gitattributes

          # 7. Création du README HF (obligatoire)
          cat <<EOF > README.md
          ---
          title: Credit Score API
          sdk: docker
          app_port: 7860
          xet: true
          ---
          # API Sync via CI/CD
          EOF

          # 8. Commit et Push
          git add .
          git add --renormalize .
          git commit -m "sync: github to hf via xet ${{ github.sha }}" || echo "No changes"
          
          # On pousse vers la branche main de Hugging Face
          git push origin main