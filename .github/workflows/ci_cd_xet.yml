name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push (SHA + latest)
        run: |
          docker build --target app \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---
  deploy:
    name: 🚀 Déploiement Hugging Face
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: Installer git-xet AVANT le checkout
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/huggingface/xet-core/refs/heads/main/git_xet/install.sh \
            | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          # Config globale identité + désactivation LFS + activation XET
          # Fait AVANT le checkout pour éviter que LFS ne s'initialise
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git config --global lfs.enabled false
          git config --global lfs.skipdownload true
          git config --global filter.lfs.clean "git-lfs clean -- %f"
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f"
          git config --global filter.lfs.process "git-lfs filter-process --skip"
          git config --global filter.lfs.required false
          git config --global filter.xet.process "git-xet filter-process"
          git config --global filter.xet.required true

      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Désactive le LFS du checkout action lui-même
          lfs: false

      - name: Déployer vers Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USERNAME }}
        run: |
          # Désinstaller LFS au niveau du repo (écrase les hooks)
          git lfs uninstall 2>/dev/null || true

          # Migrer les fichiers binaires : retirer le filtre LFS du .gitattributes
          # et le remplacer par le filtre XET
          sed -i 's/filter=lfs diff=lfs merge=lfs -text/filter=xet diff=xet merge=xet -text/g' .gitattributes 2>/dev/null || true
          sed -i 's/filter=lfs/filter=xet/g' .gitattributes 2>/dev/null || true

          # Nettoyage des fichiers MLflow (inutiles sur HF)
          git rm -r --cached ML/mlruns/ 2>/dev/null || true
          git rm -r --cached mlruns/ 2>/dev/null || true
          git rm --cached utilitaires/mlflow.db 2>/dev/null || true

          # Forcer la ré-indexation du .db avec le filtre XET
          git rm --cached utilitaires/credit_score.db 2>/dev/null || true
          git add utilitaires/credit_score.db

          # Création du README Hugging Face
          cat <<EOF > README.md
          ---
          title: Credit Score API
          emoji: 💰
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          # Credit Scoring API
          Déploiement automatique via GitHub Actions.
          EOF

          # Ajout sélectif des fichiers
          git add .gitattributes README.md Dockerfile requirements.txt src/
          git add models/*.joblib models/*.pkl 2>/dev/null || true
          git add .

          # Commit unique
          git commit -m "deploy: migrate LFS→XET, build ${{ github.sha }}" || echo "No changes to commit"

          # Push vers Hugging Face
          git push --force https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score main
