name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push (SHA + latest)
        run: |
          docker build --target app \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---
  deploy:
    name: 🚀 Déploiement Hugging Face
    runs-on: ubuntu-latest
    needs: build
    # Déploiement uniquement sur push vers main ou dev
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # On récupère les vrais fichiers pour l'upload

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer Hugging Face Hub
        run: pip install huggingface_hub

      - name: Upload vers Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERREUR : Le secret HF_TOKEN est absent."
            exit 1
          fi
          python -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi(token=os.environ['HF_TOKEN'])
          # Remplace par ton vrai chemin de Space
          repo_id = '${{ secrets.HF_USERNAME }}/Credit_Score' 
          
          print(f'Début de l\'upload du dossier vers {repo_id}...')
          
          api.upload_folder(
              folder_path='.',
              repo_id=repo_id,
              repo_type='space',
              # On ignore les fichiers inutiles pour le déploiement
              ignore_patterns=[
                  '.git*',
                  'ML/mlruns/',
                  'mlruns/',
                  'utilitaires/mlflow.db',
                  '__pycache__/',
                  'tests/'
              ],
              # Supprime sur HF les fichiers qui n'existent plus sur GitHub (nettoyage)
              delete_disappeared_files=True
          )
          print('Déploiement réussi !')
          "