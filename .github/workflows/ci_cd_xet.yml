name: CI/CD — Credit Scoring API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- JOB 1 : TESTS ---
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer les tests via Docker
        run: docker build --target test .

  # --- JOB 2 : BUILD & PUSH DOCKER HUB ---
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push (SHA + latest)
        run: |
          docker build --target app \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest 
          

  # --- JOB 3 : DEPLOY TO HUGGING FACE ---
  deploy:
    name: 🚀 Sync vers Hugging Face (via Clone)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: Installer git-xet
        run: |
          # Téléchargement direct sans passer par le script interactif
          curl -fSSML https://huggingface.co/install-xet.sh -o install-xet.sh
          chmod +x install-xet.sh
          # On lance l'installateur en mode silencieux
          ./install-xet.sh > /dev/null 2>&1 || true
          
          # On force le chemin si l'installateur l'a mis dans le dossier par défaut
          mkdir -p $HOME/.xet
          # Ajout au PATH permanent de GitHub Actions
          echo "$HOME/.xet" >> $GITHUB_PATH
          # Export pour les commandes immédiates si nécessaire
          echo "PATH=$HOME/.xet:$PATH" >> $GITHUB_ENV

      - name: Récupérer le code source GitHub
        uses: actions/checkout@v4
        with:
          path: github_repo
          fetch-depth: 0
          lfs: false

      - name: Cloner HF, Synchroniser et Pousser
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USERNAME }}
        run: |
          # 0. S'assurer que git-xet est accessible
          export PATH="$HOME/.xet:$PATH"
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git xet install --local
          
          # 1. Clonage propre du Space
          git clone https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/Credit_Score hf_space
          
          # 2. Synchronisation (Le slash après github_repo/ est important)
          rsync -av --delete --exclude='.git' github_repo/ hf_space/

          cd hf_space

          # 3. Migration XET et Nettoyage
          git xet init
          sed -i '/filter=lfs/d' .gitattributes 2>/dev/null || true
          
          # Nettoyage profond des index
          git rm -r --cached ML/mlruns/ mlruns/ 2>/dev/null || true
          git rm --cached utilitaires/mlflow.db 2>/dev/null || true

          # 4. Configuration des attributs
          echo "*.db filter=xet -text" > .gitattributes
          echo "models/*.joblib filter=xet -text" >> .gitattributes
          echo "models/*.pkl filter=xet -text" >> .gitattributes

          # 5. README HF
          cat <<EOF > README.md
          ---
          title: Credit Score API
          sdk: docker
          app_port: 7860
          xet: true
          ---
          # API Sync via CI/CD
          Dernier build: ${{ github.sha }}
          EOF

          # 6. Commit et Push
          git add .
          git add --renormalize .
          git commit -m "sync: github to hf via xet ${{ github.sha }}" || echo "No changes"
          
          git push origin main